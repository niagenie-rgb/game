<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>迪奧斯代言人｜最終結果</title>
<style>
  :root{--navy:#1c2f4e;--navy2:#26406a;--gold:#c9a15a;--gold-lt:#e4c88a;
    --ink:#26303f;--muted:#6b7a90;--line:#e2e7ef;--heart:#e0526b;--card:#fff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    background:linear-gradient(160deg,#f4f6fa,#e7ecf4);color:var(--ink);min-height:100vh}
  header{background:linear-gradient(120deg,var(--navy),var(--navy2));color:#fff;padding:22px 16px;text-align:center}
  header .logo{font-size:22px;font-weight:800;letter-spacing:2px}
  header .logo b{color:var(--gold-lt)}
  header small{display:block;font-size:12px;letter-spacing:3px;color:#c6d2e6;margin-top:4px}
  .topnav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;max-width:640px;margin:14px auto 0;padding:0 12px}
  .topnav a{text-decoration:none;font-size:13px;font-weight:700;padding:8px 14px;border-radius:20px;
    border:1px solid var(--line);color:var(--navy);background:#fff;white-space:nowrap}
  .topnav a.on{background:linear-gradient(120deg,var(--gold),var(--gold-lt));color:#3a2c07;border-color:transparent}
  .wrap{max-width:1000px;margin:0 auto;padding:18px 16px 60px}
  .bar{display:flex;gap:10px;align-items:center;justify-content:center;margin:2px 0 16px;flex-wrap:wrap}
  .btn-ghost{background:#fff;color:var(--navy);border:1px solid var(--line);font-size:13px;font-weight:700;
    padding:9px 18px;border-radius:22px;cursor:pointer;font-family:inherit}
  .updated{font-size:12px;color:var(--muted)}

  /* 冠軍 */
  .champ{background:linear-gradient(135deg,#22345a,#2f4d80);color:#fff;border-radius:22px;padding:30px 24px;text-align:center;
    margin-bottom:20px;box-shadow:0 12px 34px rgba(28,47,78,.28);position:relative;overflow:hidden}
  .champ .crown{font-size:46px}
  .champ .lab{font-size:14px;letter-spacing:4px;color:var(--gold-lt);margin-top:4px}
  .champ .nm{font-size:40px;font-weight:800;margin:6px 0}
  .champ .score{font-size:15px;color:#d8e1f0}
  .champ .score b{color:var(--gold-lt);font-size:26px}
  .champ .fee{font-size:13px;color:#c6d2e6;margin-top:6px}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:20px;
    box-shadow:0 4px 16px rgba(28,47,78,.06)}
  .panel h2{font-size:18px;color:var(--navy);margin-bottom:4px}
  .panel .sub{font-size:12.5px;color:var(--muted);margin-bottom:14px;line-height:1.6}
  .frow{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;margin-bottom:12px;
    background:#f7f9fc;border:1px solid var(--line)}
  .frow.top{background:linear-gradient(120deg,#fbf3e0,#fdf8ee);border-color:var(--gold)}
  .frow .rk{font-size:22px;font-weight:800;color:var(--gold);width:34px;text-align:center}
  .frow .info{flex:1;min-width:0}
  .frow .nm{font-weight:800;color:var(--navy);font-size:17px}
  .comp{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .comp .c{flex:1;min-width:120px}
  .comp .cl{font-size:11px;color:var(--muted);display:flex;justify-content:space-between}
  .comp .cl b{color:var(--navy)}
  .comp .cbar{height:8px;background:#e7edf5;border-radius:6px;overflow:hidden;margin-top:3px}
  .comp .cbar i{display:block;height:100%;border-radius:6px}
  .frow .tot{text-align:center;flex-shrink:0;width:82px}
  .frow .tot .tv{font-size:28px;font-weight:800;color:var(--navy);line-height:1}
  .frow .tot .tl{font-size:10px;color:var(--muted)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:6px}
  .legend span{display:flex;align-items:center;gap:5px}
  .legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
  .kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px}
  @media(max-width:560px){.kpis{grid-template-columns:1fr}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
  .kpi .l{font-size:12px;color:var(--muted)} .kpi .v{font-size:24px;font-weight:800;color:var(--navy);margin-top:2px}
  .mgr-tally{display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px dashed #e8edf4}
  .mgr-tally:last-child{border:none} .mgr-tally b{color:var(--gold)}
  .note{background:#fff8ec;border:1px solid var(--gold);border-radius:12px;padding:14px;font-size:12.5px;color:#7a5a1a;line-height:1.8}
</style>
</head>
<body>
<header>
  <div class="logo"><b>✦ Dios</b> 迪奧斯</div>
  <small>代言人 · 最終評選結果</small>
</header>
<div class="topnav">
  <a href="index.html">🗳️ 票選遊戲</a>
  <a href="dashboard.html">📊 人氣結果</a>
  <a href="wave2.html">🔍 深入評比</a>
  <a href="final.html">👔 主管評選</a>
  <a href="result.html" class="on">🏆 最終結果</a>
</div>
<div class="wrap">
  <div class="bar"><button class="btn-ghost" onclick="load()">🔄 重新整理</button><span class="updated" id="updated"></span></div>
  <div id="app"><div class="panel"><div class="sub">載入中…</div></div></div>
</div>

<script>
const SUPABASE_URL="https://yrroqndpcgaqvgxeydgn.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlycm9xbmRwY2dhcXZneGV5ZGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MTE0NjYsImV4cCI6MjA5MzA4NzQ2Nn0.4Zw2GWnuzbusCWrplOJSbV1_Nqp7KR_GWwQ-Ed0CDxE";

const CAND=[
  {name:"邰智源", fb:67, ig:51.6, threads:20,  yt:228,  fee:220},
  {name:"羅時豐", fb:20, ig:6,    threads:2.7, yt:34.5, fee:250},
  {name:"謝震武", fb:0,  ig:0,    threads:0,   yt:46.6, fee:350},
  {name:"陳隨意", fb:31, ig:1.9,  threads:1.2, yt:10.6, fee:120}
];
const SUBJ={ 產品力:{邰智源:8,羅時豐:8,謝震武:9,陳隨意:6}, 促購力:{邰智源:8,羅時豐:8,謝震武:9,陳隨意:7} };
const RISK={ 邰智源:{safety:85}, 羅時豐:{safety:65}, 謝震武:{safety:70}, 陳隨意:{safety:75} };
const W2_WEIGHTS={社群力:20,產品力:20,促購力:20,CP值:20,形象安全:20};
/* 完整評分權重（可調） */
const FINAL_WEIGHTS={ 人氣:20, 深入評比:40, 主管分數:40 };

const NAMES=CAND.map(c=>c.name);
const DIMS=["社群力","產品力","促購力","CP值","形象安全"];
const FC={人氣:"#e0526b",深入評比:"#4f7cc4",主管分數:"#c9a15a"};
const app=document.getElementById("app");
let votes=[], mgrVotes=[];

function w2(){
  const rows=CAND.map(c=>({name:c.name,fee:c.fee,social:c.fb+c.ig+c.threads}));
  const maxS=Math.max(...rows.map(r=>r.social),1);
  rows.forEach(r=>{ r.社群力=Math.round(r.social/maxS*100);
    r.產品力=(SUBJ.產品力[r.name]||0)*10; r.促購力=(SUBJ.促購力[r.name]||0)*10;
    r.base=(r.社群力+r.產品力+r.促購力)/3; r.cpRaw=r.base/r.fee; });
  const maxCp=Math.max(...rows.map(r=>r.cpRaw),1e-9);
  const ws=DIMS.reduce((s,d)=>s+(W2_WEIGHTS[d]||0),0)||1;
  rows.forEach(r=>{ r.CP值=Math.round(r.cpRaw/maxCp*100); r.形象安全=(RISK[r.name]&&RISK[r.name].safety)||0;
    r.w2total=Math.round(DIMS.reduce((s,d)=>s+r[d]*(W2_WEIGHTS[d]||0),0)/ws); });
  const m={}; rows.forEach(r=>m[r.name]=r); return m;
}
function hdr(){ return {"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}; }
function pop(){ const o={}; NAMES.forEach(n=>o[n]=0); votes.forEach(v=>{ if(v.winner&&o[v.winner]!==undefined)o[v.winner]++; }); return o; }
function mgr(){ const o={}; NAMES.forEach(n=>o[n]=0); mgrVotes.forEach(v=>{ const p=v.points||{}; NAMES.forEach(n=>{ if(p[n])o[n]+=Number(p[n]); }); }); return o; }
function norm(o){ const mx=Math.max(...Object.values(o),0); const r={}; NAMES.forEach(n=>r[n]=mx>0?Math.round(o[n]/mx*100):0); return r; }

async function load(){
  try{
    const [a,b]=await Promise.all([
      fetch(SUPABASE_URL+"/rest/v1/votes?select=winner",{headers:hdr()}),
      fetch(SUPABASE_URL+"/rest/v1/manager_votes?select=points",{headers:hdr()})
    ]);
    votes=a.ok?await a.json():[]; mgrVotes=b.ok?await b.json():[];
  }catch(e){}
  render();
  document.getElementById("updated").textContent="更新於 "+new Date().toLocaleString("zh-TW");
}

function render(){
  const W=w2(), popC=pop(), popN=norm(popC), mgrC=mgr(), mgrN=norm(mgrC);
  const fw=FINAL_WEIGHTS, fwsum=(fw.人氣+fw.深入評比+fw.主管分數)||1;
  const rows=NAMES.map(n=>{
    const comp={人氣:popN[n],深入評比:W[n].w2total,主管分數:mgrN[n]};
    const total=Math.round((comp.人氣*fw.人氣+comp.深入評比*fw.深入評比+comp.主管分數*fw.主管分數)/fwsum);
    return {name:n,fee:W[n].fee,comp,total,pop:popC[n],mgrPts:mgrC[n]};
  }).sort((a,b)=>b.total-a.total);
  const win=rows[0];
  const mgrTotal=mgrVotes.length;

  app.innerHTML=`
   <div class="champ">
     <div class="crown">👑</div><div class="lab">最終獲選代言人</div>
     <div class="nm">${win.name}</div>
     <div class="score">完整評分 <b>${win.total}</b> / 100</div>
     <div class="fee">代言費 ${win.fee} 萬 · 人氣 ${win.pop} 票 · 主管 ${win.mgrPts} 分</div>
   </div>

   <div class="kpis">
     <div class="kpi"><div class="l">主管評選人數</div><div class="v">${mgrTotal}</div></div>
     <div class="kpi"><div class="l">人氣投票份數</div><div class="v">${votes.length}</div></div>
     <div class="kpi"><div class="l">冠軍完整評分</div><div class="v">${win.total}</div></div>
   </div>

   <div class="panel">
     <h2>🏁 完整評分・最終排名</h2>
     <div class="sub">綜合＝人氣 ${fw.人氣}%＋深入評比 ${fw.深入評比}%＋主管分數 ${fw.主管分數}%（各換算 0–100）。</div>
     ${rows.map((r,i)=>`
       <div class="frow ${i===0?'top':''}">
         <div class="rk">${i===0?'👑':'#'+(i+1)}</div>
         <div class="info"><div class="nm">${r.name} <span style="font-size:12px;color:#6b7a90;font-weight:500">代言費 ${r.fee}萬</span></div>
           <div class="comp">${["人氣","深入評比","主管分數"].map(k=>`<div class="c">
             <div class="cl"><span>${k}</span><b>${r.comp[k]}</b></div>
             <div class="cbar"><i style="width:${r.comp[k]}%;background:${FC[k]}"></i></div></div>`).join("")}</div>
         </div>
         <div class="tot"><div class="tv">${r.total}</div><div class="tl">完整評分</div></div>
       </div>`).join("")}
     <div class="legend">${["人氣","深入評比","主管分數"].map(k=>`<span><i style="background:${FC[k]}"></i>${k}</span>`).join("")}</div>
   </div>

   <div class="panel">
     <h2>👔 主管評選得票</h2>
     <div class="sub">每位主管投一票（3 分）給心中人選。</div>
     ${NAMES.map(n=>`<div class="mgr-tally"><span>${n}</span><b>${mgrC[n]} 分（${Math.round(mgrC[n]/3)} 票）</b></div>`).join("")}
   </div>

   <div class="note">權重可在本檔上方 <code>FINAL_WEIGHTS</code> 調整；分析與計分依據見 <a href="wave2.html">🔍 深入評比</a>；要投主管票請到 <a href="final.html">👔 主管評選</a>。</div>`;
}
load();
</script>
</body>
</html>
