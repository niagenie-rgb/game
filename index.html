<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>迪奧斯 Dios｜代言人票選遊戲</title>
<style>
  :root{
    --navy:#1c2f4e; --navy2:#26406a; --gold:#c9a15a; --gold-lt:#e4c88a;
    --card:#fff; --ink:#26303f; --muted:#6b7a90; --heart:#e0526b; --nope:#7c8aa0; --line:#e2e7ef;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    background:linear-gradient(160deg,#f4f6fa,#e7ecf4);color:var(--ink);min-height:100vh;
    -webkit-font-smoothing:antialiased;overflow-x:hidden}
  .wrap{max-width:480px;margin:0 auto;padding:0 16px 32px}

  header{background:linear-gradient(120deg,var(--navy),var(--navy2));color:#fff;
    padding:20px 16px 22px;text-align:center;box-shadow:0 6px 24px rgba(28,47,78,.25)}
  .logo{font-size:24px;font-weight:800;letter-spacing:2px}
  .logo b{color:var(--gold-lt)}
  .logo small{display:block;font-size:11px;letter-spacing:4px;color:#c6d2e6;margin-top:3px;font-weight:400}
  .subtitle{margin-top:8px;font-size:13px;color:#d8e1f0}

  .steps{display:flex;justify-content:center;gap:6px;margin:16px 0 4px;max-width:480px;margin-left:auto;margin-right:auto;padding:0 16px}
  .steps .dot{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1}
  .steps .num{width:28px;height:28px;border-radius:50%;background:#fff;border:2px solid var(--line);
    color:var(--muted);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;transition:.3s}
  .steps .lbl{font-size:11px;color:var(--muted)}
  .steps .dot.active .num{background:var(--gold);border-color:var(--gold);color:#fff;transform:scale(1.1)}
  .steps .dot.done .num{background:var(--navy);border-color:var(--navy);color:#fff}
  .steps .dot.active .lbl{color:var(--navy);font-weight:700}

  .stage-head{text-align:center;margin:16px 0 4px}
  .stage-head h2{font-size:20px;color:var(--navy)}
  .stage-head h2 span{color:var(--gold)}
  .stage-head p{color:var(--muted);font-size:12.5px;margin-top:5px;line-height:1.6}
  .progress{font-size:12px;color:var(--navy);background:#fff;border:1px solid var(--line);
    border-radius:20px;padding:3px 14px;display:inline-block;margin-top:8px}

  /* Deck */
  .deck{position:relative;margin:14px 0 6px;touch-action:pan-y}
  .swipe-card{position:relative;background:var(--card);border-radius:22px;
    border:1px solid var(--line);box-shadow:0 12px 34px rgba(28,47,78,.14);
    padding:18px;display:flex;flex-direction:column;overflow:hidden;
    will-change:transform;user-select:none;cursor:grab}
  .swipe-card.behind{position:absolute;inset:0}
  .swipe-card.behind{transform:scale(.94) translateY(16px);box-shadow:0 6px 18px rgba(28,47,78,.08);pointer-events:none;opacity:.7}
  .swipe-card:active{cursor:grabbing}
  .tag{align-self:flex-start;background:var(--navy);color:#fff;font-size:12px;font-weight:700;
    padding:4px 14px;border-radius:20px;letter-spacing:1px}
  .resume{margin-top:16px;min-height:340px;list-style:none}
  .resume li{position:relative;padding-left:24px;font-size:15px;line-height:1.55;color:#3b4658;margin-bottom:14px}
  .resume li::before{content:"✦";position:absolute;left:0;top:0;color:var(--gold);font-size:14px}
  .media{position:relative;width:100%;margin-top:8px;border-radius:16px;overflow:hidden;
    background:#f2f5fa;line-height:0}
  .photo{width:100%;height:auto;display:block}
  .photo-ph{width:100%;aspect-ratio:3/2;background:linear-gradient(135deg,#c9d3e2,#e6ecf5);
    display:flex;align-items:center;justify-content:center;color:#8fa0ba;font-size:14px;text-align:center;line-height:1.7}
  .price-tag{position:absolute;right:14px;top:14px;background:linear-gradient(120deg,var(--gold),var(--gold-lt));
    color:#3a2c07;font-weight:800;padding:9px 16px;border-radius:14px;box-shadow:0 5px 16px rgba(0,0,0,.28);
    transform:rotate(3deg);text-align:center;line-height:1.15}
  .price-tag .pl{font-size:10px;font-weight:700;opacity:.85;display:block}
  .price-tag .pv{font-size:22px;letter-spacing:1px}
  .price-tag .pv small{font-size:13px}

  /* intro */
  .intro{background:linear-gradient(150deg,var(--navy),var(--navy2));color:#fff;border-radius:22px;
    padding:44px 26px;text-align:center;box-shadow:0 14px 40px rgba(28,47,78,.28);margin-top:8px}
  .intro .im{font-size:44px}
  .intro h1{font-size:27px;font-weight:800;margin-top:14px;letter-spacing:1px;line-height:1.35}
  .intro h1 span{color:var(--gold-lt)}
  .intro p{color:#cdd8ec;font-size:15px;margin-top:14px;line-height:1.7}
  .intro .go{margin-top:26px;background:linear-gradient(120deg,var(--gold),var(--gold-lt));color:#3a2c07;
    border:none;border-radius:30px;padding:15px 44px;font-size:17px;font-weight:800;cursor:pointer;
    font-family:inherit;box-shadow:0 8px 22px rgba(201,161,90,.4);transition:.2s}
  .intro .go:hover{transform:translateY(-3px)}
  .intro .tiny{margin-top:18px;font-size:12px;color:#9fb0cc}

  /* stamps */
  .stamp{position:absolute;top:26px;font-size:26px;font-weight:900;padding:6px 16px;border-radius:12px;
    border:4px solid;opacity:0;transform:rotate(-16deg);letter-spacing:2px}
  .stamp.like{left:22px;color:var(--heart);border-color:var(--heart);transform:rotate(-16deg)}
  .stamp.nope{right:22px;color:var(--nope);border-color:var(--nope);transform:rotate(16deg)}

  .actions{display:flex;justify-content:center;align-items:center;gap:26px;margin-top:14px}
  .act{width:64px;height:64px;border-radius:50%;border:none;background:#fff;cursor:pointer;
    box-shadow:0 6px 18px rgba(28,47,78,.14);font-size:26px;display:flex;align-items:center;justify-content:center;
    transition:.15s;font-family:inherit}
  .act:hover{transform:translateY(-3px)}
  .act.nope{color:var(--nope)}
  .act.like{color:var(--heart)}
  .act.big{width:72px;height:72px;font-size:30px}
  .hint{text-align:center;color:#9aa7ba;font-size:12px;margin-top:12px}

  /* Winner */
  .winner{background:var(--card);border-radius:22px;padding:26px;text-align:center;margin-top:16px;
    border:1px solid var(--line);box-shadow:0 10px 30px rgba(28,47,78,.1)}
  .crown{font-size:38px}
  .winner h3{color:var(--gold);font-size:14px;letter-spacing:3px;margin-top:4px}
  .winner .wname{font-size:32px;font-weight:800;color:var(--navy);margin:8px 0}
  .wphoto{width:180px;max-width:70%;aspect-ratio:3/4;border-radius:16px;object-fit:cover;margin:10px auto;
    background:linear-gradient(135deg,#c9d3e2,#e6ecf5);display:flex;align-items:center;justify-content:center;color:#8fa0ba;font-size:13px}
  .score-row{display:flex;justify-content:center;gap:16px;margin:14px 0;flex-wrap:wrap}
  .score-row .s{background:#f4f6fa;border-radius:12px;padding:10px 16px;min-width:96px}
  .score-row .s .sl{font-size:11px;color:var(--muted)}
  .score-row .s .sv{font-size:20px;font-weight:800;color:var(--navy)}
  .reason-box{margin-top:16px;text-align:left}
  .reason-box label{font-size:14px;font-weight:700;color:var(--navy);display:block;margin-bottom:8px}
  textarea{width:100%;min-height:104px;border:1px solid var(--line);border-radius:12px;padding:14px;
    font-family:inherit;font-size:15px;line-height:1.7;color:var(--ink)}
  textarea:focus{outline:none;border-color:var(--gold)}
  .btn{border:none;border-radius:30px;padding:13px 30px;font-size:15px;font-weight:700;cursor:pointer;
    font-family:inherit;transition:.2s;margin-top:16px}
  .btn-primary{background:linear-gradient(120deg,var(--gold),var(--gold-lt));color:#3a2c07;box-shadow:0 6px 18px rgba(201,161,90,.35)}
  .btn-ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .ranking{margin-top:20px;text-align:left}
  .ranking h4{font-size:13px;color:var(--muted);margin-bottom:10px;text-align:center}
  .rank-item{display:flex;align-items:center;gap:12px;background:#f7f9fc;border-radius:12px;padding:11px 16px;margin-bottom:8px}
  .rank-item .r{font-weight:800;color:var(--gold);width:22px}
  .rank-item .rn{flex:1;font-weight:700;color:var(--navy)}
  .rank-item .rs{color:var(--heart);font-weight:700}
  .done-msg{margin-top:14px;padding:14px;background:#eef7ee;border:1px solid #cfe6cf;border-radius:12px;
    color:#3a7a3a;text-align:center;font-size:14px;display:none}
  .nav-btns{display:flex;gap:10px;justify-content:center;margin-top:18px}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:20px;line-height:1.7}
</style>
</head>
<body>
<header>
  <div class="logo"><b>✦ Dios</b> 迪奧斯</div>
  <div class="logo"><small>代言人票選遊戲</small></div>
  <div class="subtitle">右滑 ❤ 喜歡 · 左滑 ✕ 跳過</div>
</header>

<div class="steps" id="steps">
  <div class="dot" data-s="1"><div class="num">1</div><div class="lbl">看簡歷</div></div>
  <div class="dot" data-s="2"><div class="num">2</div><div class="lbl">看照片</div></div>
  <div class="dot" data-s="3"><div class="num">3</div><div class="lbl">看費用</div></div>
  <div class="dot" data-s="4"><div class="num">4</div><div class="lbl">選冠軍</div></div>
</div>

<div class="wrap"><div id="app"></div></div>

<footer>© Dios 迪奧斯多功能調整床｜內部票選互動遊戲<br>每張卡片右滑喜歡、左滑跳過，四關結束選出最佳代言人。</footer>

  { id:"B", name:"邰智源", fee:220, resume:[

    "高性價比，走「真材實料、好睡有感」親切路線" ] }
];
const ALIAS = { A:"候選人 一", B:"候選人 二", C:"候選人 三", D:"候選人 四" };

/* ====== Supabase 後台設定：填入你的專案網址與 anon public 金鑰 ======
   （兩個都留空的話遊戲照常能玩，只是不會把票數送到後台統計） */
const SUPABASE_URL = "https://yrroqndpcgaqvgxeydgn.supabase.co";   // 例：https://xxxx.supabase.co
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlycm9xbmRwY2dhcXZneGV5ZGduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MTE0NjYsImV4cCI6MjA5MzA4NzQ2Nn0.4Zw2GWnuzbusCWrplOJSbV1_Nqp7KR_GWwQ-Ed0CDxE";   // Project Settings → API → anon public key
const PID = (window.crypto&&crypto.randomUUID)?crypto.randomUUID():("p"+Date.now()+Math.floor(Math.random()*1e6));

async function sendVote(payload){
  if(!SUPABASE_URL||!SUPABASE_KEY) return;
  try{
    await fetch(SUPABASE_URL.replace(/\/$/,"")+"/rest/v1/votes",{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SUPABASE_KEY,
        "Authorization":"Bearer "+SUPABASE_KEY,"Prefer":"return=minimal"},
      body:JSON.stringify(payload)
    });
  }catch(e){console.warn("送出失敗",e);}
}

let stage=0, idx=0;
const likes={1:{},2:{},3:{}};
const app=document.getElementById("app");
const steps=document.getElementById("steps");

function setSteps(){
  steps.style.display = (stage>=1&&stage<=4)?"flex":"none";
  document.querySelectorAll("#steps .dot").forEach(d=>{
    const s=+d.dataset.s;d.classList.toggle("active",s===stage);d.classList.toggle("done",s<stage);});}

function photoBox(id){
  const inner = PHOTOS[id]?`<img class="photo" src="${PHOTOS[id]}">`:`<div class="photo-ph">📷<br>照片待嵌入</div>`;
  return inner;
}
function cardInner(c){
  if(stage===1) return `<div class="tag">${ALIAS[c.id]}</div>
     <ul class="resume">${c.resume.map(li=>`<li>${li}</li>`).join("")}</ul>`;
  if(stage===2) return `<div class="media">${photoBox(c.id)}</div>`;
  return `<div class="media">${photoBox(c.id)}
     <div class="price-tag"><span class="pl">代言費用</span><span class="pv">${c.fee}<small>萬</small></span></div></div>`;
}

const heads={
  1:{t:"看簡歷選人",p:"只看條件、不看名字。<br>覺得適合就右滑 ❤，不喜歡就左滑 ✕"},
  2:{t:"看照片選人",p:"憑感覺選。<br>喜歡的形象就右滑 ❤"},
  3:{t:"看費用選人",p:"揭曉身分與代言費用。<br>綜合考量後再選一次 ❤"}
};

function render(){
  setSteps();
  if(stage===0){renderIntro();window.scrollTo({top:0,behavior:"smooth"});return;}
  if(stage===4){renderWinner();window.scrollTo({top:0,behavior:"smooth"});return;}
  const h=heads[stage], c=CANDS[idx], nextC=CANDS[idx+1];
  app.innerHTML=`
   <div class="stage-head"><h2>第${["一","二","三"][stage-1]}關 · <span>${h.t}</span></h2>
     <p>${h.p}</p><div class="progress">${idx+1} / ${CANDS.length}</div></div>
   <div class="deck" id="deck">
     ${nextC?`<div class="swipe-card behind">${cardInner(nextC)}</div>`:``}
     <div class="swipe-card" id="top">
       <div class="stamp like">喜歡</div><div class="stamp nope">跳過</div>
       ${cardInner(c)}
     </div>
   </div>
   <div class="actions">
     <button class="act nope" onclick="decide(false)">✕</button>
     <button class="act like big" onclick="decide(true)">❤</button>
   </div>
   <div class="hint">可以直接用手指／滑鼠拖曳卡片，或點下方按鈕</div>`;
  attachDrag();
}

function decide(liked){
  const c=CANDS[idx];
  likes[stage][c.id]=liked;
  const top=document.getElementById("top");
  top.style.transition="transform .4s ease, opacity .4s ease";
  top.style.transform=`translateX(${liked?600:-600}px) rotate(${liked?30:-30}deg)`;
  top.style.opacity="0";
  setTimeout(advance,300);
}
function advance(){
  idx++;
  if(idx>=CANDS.length){ stage++; idx=0; }
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function attachDrag(){
  const top=document.getElementById("top"); if(!top) return;
  const like=top.querySelector(".stamp.like"), nope=top.querySelector(".stamp.nope");
  let sx=0,sy=0,dx=0,dragging=false;
  const start=(x,y)=>{dragging=true;sx=x;sy=y;top.style.transition="none";};
  const move=(x,y)=>{if(!dragging)return;dx=x-sx;const dy=y-sy;
    top.style.transform=`translate(${dx}px,${dy}px) rotate(${dx/18}deg)`;
    like.style.opacity=Math.max(0,dx/120); nope.style.opacity=Math.max(0,-dx/120);};
  const end=()=>{if(!dragging)return;dragging=false;
    if(Math.abs(dx)>110){decide(dx>0);}
    else{top.style.transition="transform .3s";top.style.transform="";like.style.opacity=0;nope.style.opacity=0;}dx=0;};
  top.addEventListener("mousedown",e=>start(e.clientX,e.clientY));
  window.addEventListener("mousemove",e=>move(e.clientX,e.clientY));
  window.addEventListener("mouseup",end);
  top.addEventListener("touchstart",e=>start(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  top.addEventListener("touchmove",e=>move(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  top.addEventListener("touchend",end);
}

function renderIntro(){
  app.innerHTML=`
   <div class="intro">
     <div class="im">👑✦</div>
     <h1>迪奧斯<span> 年度代言人 </span>票選</h1>
     <p>選出你最有好感的候選人！<br>四個關卡，右滑 ❤ 喜歡、左滑 ✕ 跳過，<br>最後選出你心中的最佳代言人。</p>
     <button class="go" onclick="startGame()">開始票選 →</button>
     <div class="tiny">預計 1 分鐘 · 共 4 關</div>
   </div>`;
}
function startGame(){stage=1;idx=0;render();}

function renderWinner(){
  const scored=CANDS.map(c=>{
    const t=(likes[1][c.id]?1:0)+(likes[2][c.id]?1:0)+(likes[3][c.id]?1:0);
    return{...c,total:t};
  }).sort((a,b)=>b.total-a.total||a.fee-b.fee);
  const win=scored[0], noVote=scored.every(x=>x.total===0);
  app.innerHTML=`
   <div class="stage-head"><h2>第四關 · <span>你的最佳代言人</span></h2>
     <p>綜合三關的愛心，得分最高的是這一位！</p></div>
   ${noVote?`<div class="winner"><div class="crown">🤔</div>
     <p style="color:#6b7a90;margin-top:10px">你三關都左滑跳過了，<br>回去挑一個喜歡的吧！</p>
     <button class="btn btn-ghost" onclick="restart()">重新開始 ↺</button></div>`:
   `<div class="winner">
     <div class="crown">👑</div><h3>本次冠軍</h3>
     <div class="wname">${win.name}</div>
     ${PHOTOS[win.id]?`<img class="wphoto" src="${PHOTOS[win.id]}">`:`<div class="wphoto">📷 照片待嵌入</div>`}
     <div class="score-row">
       <div class="s"><div class="sl">總愛心</div><div class="sv">${win.total} / 3</div></div>
       <div class="s"><div class="sl">代言費用</div><div class="sv">${win.fee} 萬</div></div></div>
     <div class="reason-box">
       <label>為什麼你覺得「${win.name}」適合當迪奧斯的代言人？</label>
       <textarea id="reason" placeholder="寫下你的理由…例如：形象健康、貼近客群、值得信賴、CP值高…"></textarea></div>
     <button class="btn btn-primary" onclick="submitReason()">送出我的選擇</button>
     <div class="done-msg" id="doneMsg">✅ 已記錄你的選擇，感謝參與！</div>
   </div>`}
   <div class="ranking"><h4>— 你的完整排名 —</h4>
     ${scored.map((c,i)=>`<div class="rank-item"><div class="r">${i+1}</div>
       <div class="rn">${c.name} <span style="color:#6b7a90;font-weight:400;font-size:12px">（${c.fee}萬）</span></div>
       <div class="rs">❤ ${c.total}</div></div>`).join("")}</div>
   <div class="nav-btns"><button class="btn btn-ghost" onclick="restart()">重新開始 ↺</button></div>`;
  window.scrollTo({top:0,behavior:"smooth"});
}
function submitReason(){
  const r=document.getElementById("reason");
  if(r&&r.value.trim().length<2){r.focus();r.style.borderColor="#e0526b";return;}
  const nameById={}; CANDS.forEach(c=>nameById[c.id]=c.name);
  const payload={
    pid:PID,
    winner:document.querySelector(".wname").textContent,
    reason:r?r.value.trim():"",
    s1:mapLikes(1,nameById), s2:mapLikes(2,nameById), s3:mapLikes(3,nameById)
  };
  sendVote(payload);
  const btn=document.querySelector(".btn-primary"); if(btn){btn.disabled=true;btn.textContent="已送出 ✓";}
  document.getElementById("doneMsg").style.display="block";
}
function mapLikes(s,nameById){
  const o={}; CANDS.forEach(c=>o[nameById[c.id]]=likes[s][c.id]?1:0); return o;
}
function restart(){stage=1;idx=0;[1,2,3].forEach(s=>Object.keys(likes[s]).forEach(k=>delete likes[s][k]));render();}
render();
</script>
